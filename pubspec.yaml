name: digital_wife
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  adhan: ^2.0.0+1
  cloud_firestore: ^6.7.1
  firebase_analytics: ^12.4.5
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
flutter:
  uses-material-design: true
  assets:
    - assets/alina.png

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "image.png"

flutter_native_splash:
  color: "#f52670"
  image: "image.png"
  android: true

